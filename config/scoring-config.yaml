# =============================================================================
# CargoBit Scoring Configuration
# =============================================================================
# Produktionsreife YAML für Security-Config-Service mit Schema-Validierung,
# Versioning und Rollback-Support.
#
# Alle Werte sind normalisiert (0-1) und müssen in Summe 1.0 ergeben.
# Änderungen erfordern Approval von Product & Engineering.
# =============================================================================

version: 1.0.0
kind: scoring-config
metadata:
  name: capacity-matching-scoring
  description: >
    Scoring-Konfiguration für Kapazitätsbasiertes Matching von Zusatzaufträgen.
    Alle Werte sind normalisiert (0–1) und müssen in Summe 1.0 ergeben.
  owner: product-logistics
  lastUpdatedBy: sergej
  lastUpdatedAt: "2025-04-19T14:30:00Z"
  changeReason: "Initial production configuration"
  tags:
    - scoring
    - matching
    - logistics
    - optimization

spec:
  # ============================================================================
  # SCORING-GEWICHTUNG
  # ============================================================================
  scoring:
    # Gewichtung der einzelnen Score-Komponenten.
    # Die Summe aller Werte MUSS 1.0 ergeben (Constraint-Validierung).
    weights:
      revenue: 0.35               # Wirtschaftlichkeit (Preis / Umweg)
      capacityUtilization: 0.20   # Wie gut füllt der Auftrag die freie Kapazität?
      priority: 0.10              # Business-Priorität (Premium, SLA, Vertragskunden)
      risk: 0.10                  # Risiko (Zahlungsausfall, Historie, Zuverlässigkeit)
      serviceLevel: 0.15          # SLA-Relevanz, Kundentyp, Serviceklasse
      co2: 0.10                   # CO₂-Effizienz (Leerkilometer-Reduktion)

    # Validierungsregeln für den Config-Service
    constraints:
      sumEquals: 1.0              # Sicherheitsnetz gegen Fehlkonfigurationen
      minValue: 0.0
      maxValue: 1.0
      precision: 2                # Max 2 Nachkommastellen

    # Konfiguration für die Berechnung einzelner Teil-Scores
    components:
      # --- Revenue Score ---
      # Höherer Score = bessere Revenue/Detour-Ratio
      revenue:
        minDetourKm: 0
        maxDetourKm: 20
        formula: "price / (detourKm + 1)"
        normalization: "minmax"
        bounds:
          min: 0.0
          max: 100.0
        description: "Revenue normalisiert auf Detour-Aufwand"

      # --- Capacity Utilization Score ---
      # Berechnet, wie gut der Auftrag die freie Kapazität füllt
      capacityUtilization:
        method: "volume"          # volume | pallets | hybrid
        minVolume: 0.0
        maxVolume: 100.0
        formula: "orderVolumeM3 / capacityFreeM3"
        bounds:
          min: 0.0
          max: 1.0
        description: "Auslastung der verfügbaren Kapazität"

      # --- Priority Score ---
      # Business-Priorität des Kunden/Auftrags
      priority:
        mapping:
          PREMIUM: 1.0
          HIGH: 0.8
          NORMAL: 0.5
          LOW: 0.2
        default: "NORMAL"
        source: "customer_master_data"
        description: "Kundenpriorität aus CRM/Master-Data"

      # --- Risk Score ---
      # 1.0 = geringes Risiko, 0.0 = hohes Risiko
      risk:
        mapping:
          VERY_LOW: 1.0           # Sehr zuverlässiger Kunde
          LOW: 0.8                # Gute Historie
          MEDIUM: 0.5             # Standard
          HIGH: 0.2               # Achtung
          VERY_HIGH: 0.0          # Kritisch
        default: "MEDIUM"
        factors:
          - payment_history
          - cancellation_rate
          - credit_rating
        factorWeights:
          payment_history: 0.4
          cancellation_rate: 0.3
          credit_rating: 0.3
        description: "Risikobewertung basierend auf Kundenhistorie"

      # --- Service Level Score ---
      # SLA-Relevanz und Kundensegment
      serviceLevel:
        mapping:
          SLA_CRITICAL: 1.0       # SLA-kritisch, Priorität 1
          SLA_HIGH: 0.7           # Hohe SLA-Anforderungen
          STANDARD: 0.3           # Standard-Kunde
        default: "STANDARD"
        slaTiers:
          PLATINUM: 1.0
          GOLD: 0.85
          SILVER: 0.6
          BRONZE: 0.4
        description: "SLA-Kritikalität und Kundensegment"

      # --- CO2 Score ---
      # Nachhaltigkeit: Leerkilometer-Reduktion
      co2:
        formula: "1 - (detourKm / maxDetourKm)"
        maxDetourKm: 20
        bonusForBackload: 0.2
        penaltyForEmptyReturn: 0.1
        description: "CO₂-Effizienz durch Leerkilometer-Reduktion"

  # ============================================================================
  # GLOBALE MATCHING-REGELN
  # ============================================================================
  matching:
    maxPickupDetourKm: 15
    maxDeliveryDetourKm: 20
    minScoreThreshold: 0.5
    maxSuggestionsPerTour: 5
    timeWindowToleranceMinutes: 30
    minVolumeFreeM3: 0.5
    minWeightFreeKg: 100

  # ============================================================================
  # FEATURE FLAGS
  # ============================================================================
  features:
    enableVisionModel: false          # Iteration 2: Bildanalyse
    enableLearningToRank: false       # Iteration 3: ML-basiertes Ranking
    enableDriverPreferenceScore: false # Iteration 3: Fahrer-Präferenzen
    enableRiskModelV2: false          # Erweitertes Risikomodell
    enableCO2Optimization: false      # CO₂-Optimierung aktiv
    enableHybridScoring: true         # Hybrid: Heuristik + ML

  # ============================================================================
  # ML-HYBRID SCORING CONFIGURATION
  # ============================================================================
  mlHybrid:
    enabled: true
    alpha: 0.8                        # Weight for heuristic score
    # final_score = alpha * heuristic + (1 - alpha) * ml_score
    fallbackToHeuristic: true         # If ML service unavailable
    canaryPercentage: 0               # 0 = shadow mode, 100 = full ML

  # ============================================================================
  # PROFILE (Alternative Konfigurationen)
  # ============================================================================
  profiles:
    - id: revenue_focused
      name: "Revenue-Fokus"
      isDefault: true
      weights:
        revenue: 0.35
        capacityUtilization: 0.20
        priority: 0.10
        risk: 0.10
        serviceLevel: 0.15
        co2: 0.10

    - id: premium_customers
      name: "Premium-Kunden"
      isDefault: false
      weights:
        revenue: 0.25
        capacityUtilization: 0.15
        priority: 0.15
        risk: 0.10
        serviceLevel: 0.25
        co2: 0.10

    - id: sustainability
      name: "Nachhaltigkeit"
      isDefault: false
      weights:
        revenue: 0.25
        capacityUtilization: 0.15
        priority: 0.10
        risk: 0.10
        serviceLevel: 0.10
        co2: 0.30

    - id: risk_averse
      name: "Risikominimierung"
      isDefault: false
      weights:
        revenue: 0.25
        capacityUtilization: 0.15
        priority: 0.10
        risk: 0.25
        serviceLevel: 0.15
        co2: 0.10

  # ============================================================================
  # TENANT-SPECIFIC OVERRIDES
  # ============================================================================
  tenantOverrides:
    - tenantId: "TENANT_DE_NORTH"
      region: "DE-NORTH"
      profileId: "sustainability"
      reason: "Nachhaltigkeits-Initiative Norddeutschland"
      effectiveFrom: "2025-01-01"

    - tenantId: "TENANT_DE_SOUTH"
      region: "DE-SOUTH"
      profileId: "premium_customers"
      reason: "Premium-Kunden-Fokus Süddeutschland"
      effectiveFrom: "2025-01-01"

    - tenantId: "TENANT_AT"
      region: "AT"
      profileId: "revenue_focused"
      reason: "Standard-Profil Österreich"
      effectiveFrom: "2025-01-01"

  # ============================================================================
  # AUDIT & COMPLIANCE
  # ============================================================================
  audit:
    logAllScoringDecisions: true
    retentionDays: 90
    includeExplainability: true       # SHAP values in audit log
