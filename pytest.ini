[pytest]
# =============================================================================
# CargoBit Test Configuration - Pytest
# =============================================================================
testpaths = tests config-service/tests ml-pipeline/tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may require services)
    e2e: End-to-end tests (full stack)
    slow: Tests that take longer than 1 second
    ml: ML-related tests
    config: Config-service tests
    scoring: Scoring tests
    requires_redis: Tests requiring Redis
    requires_postgres: Tests requiring PostgreSQL
    requires_kafka: Tests requiring Kafka

# Async
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Coverage
addopts = 
    --verbose
    --tb=short
    --strict-markers
    --cov=src
    --cov=config_service
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=80
    -p no:warnings

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeouts (requires pytest-timeout)
timeout = 300
timeout_method = thread

# Parallel execution (requires pytest-xdist)
# -n auto: Use all available CPUs
# -n 4: Use 4 workers
