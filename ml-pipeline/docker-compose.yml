# CargoBit ML Pipeline - Docker Compose
# =====================================
#
# Local development environment for the ML pipeline.
#
# Services:
# - mlflow: Experiment tracking and model registry
# - redis: Feature store online store
# - postgres: Feature store registry
# - scoring: ML scoring service
# - feast: Feature store server
#
# Usage:
#   docker-compose up -d
#   docker-compose logs -f scoring

version: "3.8"

services:
  # MLflow Tracking Server
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    container_name: cargobit-mlflow
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=postgresql://mlflow:mlflow@postgres:5432/mlflow
      - MLFLOW_ARTIFACT_ROOT=/mlflow/artifacts
    volumes:
      - mlflow-artifacts:/mlflow/artifacts
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://mlflow:mlflow@postgres:5432/mlflow
      --default-artifact-root file:///mlflow/artifacts
    depends_on:
      - postgres
    networks:
      - ml-network

  # PostgreSQL (Feature Store Registry + MLflow Backend)
  postgres:
    image: postgres:15-alpine
    container_name: cargobit-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=cargobit
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - ml-network

  # Redis (Feature Store Online Store)
  redis:
    image: redis:7-alpine
    container_name: cargobit-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - ml-network

  # Feature Store Server (Feast)
  feast:
    build:
      context: ./feature_store
      dockerfile: Dockerfile
    container_name: cargobit-feast
    ports:
      - "6566:6566"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - REDIS_HOST=redis
    volumes:
      - ./feature_store:/app/feature_store
      - feast-data:/app/data
    depends_on:
      - postgres
      - redis
    networks:
      - ml-network

  # ML Scoring Service
  scoring:
    build:
      context: .
      dockerfile: Dockerfile.scoring
    container_name: cargobit-scoring
    ports:
      - "8080:8080"
    environment:
      - MLFLOW_URI=http://mlflow:5000
      - BLEND_FACTOR=0.8
      - SCORING_MODE=shadow
      - CANARY_PERCENTAGE=0.1
    depends_on:
      - mlflow
      - redis
    networks:
      - ml-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MinIO (S3-compatible storage for local development)
  minio:
    image: minio/minio:latest
    container_name: cargobit-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - ml-network

  # Prometheus (Metrics)
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: cargobit-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - ml-network

  # Grafana (Visualization)
  grafana:
    image: grafana/grafana:10.2.0
    container_name: cargobit-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - ml-network

networks:
  ml-network:
    driver: bridge

volumes:
  mlflow-artifacts:
  postgres-data:
  redis-data:
  feast-data:
  minio-data:
  prometheus-data:
  grafana-data:
