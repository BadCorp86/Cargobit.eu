# =============================================================================
# CargoBit CI/CD Pipeline
# =============================================================================
# 
# Stages:
# 1. Test (Unit + Integration)
# 2. Build (Docker Images)
# 3. Security Scan
# 4. Deploy (Staging -> Production)
#
# Triggered on: push to main/develop, PRs, releases

name: CargoBit CI/CD

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main, develop]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
  GO_VERSION: '1.21'

jobs:
  # ===========================================================================
  # JOB: Code Quality
  # ===========================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint --if-present

      - name: Run TypeScript Check
        run: npx tsc --noEmit

      - name: Check Formatting
        run: npm run format:check --if-present

  # ===========================================================================
  # JOB: Python Tests
  # ===========================================================================
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: code-quality
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: cargobit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r config-service/requirements.txt
          pip install pytest pytest-cov pytest-asyncio pytest-timeout pytest-xdist

      - name: Run Unit Tests
        env:
          TEST_REDIS_URL: redis://localhost:6379/15
          TEST_DATABASE_URL: postgresql://test:test@localhost:5432/cargobit_test
        run: |
          pytest tests/unit \
            -v \
            --cov=config_service \
            --cov-report=xml:coverage-unit.xml \
            --cov-fail-under=80 \
            -n auto

      - name: Run Integration Tests
        env:
          TEST_REDIS_URL: redis://localhost:6379/15
          TEST_DATABASE_URL: postgresql://test:test@localhost:5432/cargobit_test
        run: |
          pytest tests/integration \
            -v \
            --cov=config_service \
            --cov-report=xml:coverage-integration.xml \
            -m integration

      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage-unit.xml,coverage-integration.xml
          fail_ci_if_error: false

  # ===========================================================================
  # JOB: Frontend Tests
  # ===========================================================================
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm run test:unit --if-present

      - name: Run E2E Tests
        run: npm run test:e2e --if-present

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/
            test-results/
            playwright-report/

  # ===========================================================================
  # JOB: Security Scan
  # ===========================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [python-tests, frontend-tests]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  # ===========================================================================
  # JOB: Build Docker Images
  # ===========================================================================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [security-scan]
    if: github.event_name != 'pull_request'

    outputs:
      config-service-tag: ${{ steps.config-service.outputs.tag }}
      api-gateway-tag: ${{ steps.api-gateway.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          echo "version=$(cat config/scoring-config.yaml | grep 'version:' | head -1 | awk '{print $2}')" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # Config Service
      - name: Build & Push Config Service
        id: config-service
        uses: docker/build-push-action@v5
        with:
          context: ./config-service
          file: ./config-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/config-service:${{ steps.meta.outputs.sha_short }}
            ghcr.io/${{ github.repository }}/config-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # API Gateway
      - name: Build & Push API Gateway
        id: api-gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./mini-services/api-gateway/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api-gateway:${{ steps.meta.outputs.sha_short }}
            ghcr.io/${{ github.repository }}/api-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # JOB: Deploy to Staging
  # ===========================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.cargobit.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name cargobit-staging

      - name: Deploy Config Service
        run: |
          helm upgrade --install config-service ./helm/core/config-service \
            --namespace cargobit \
            --set image.tag=${{ needs.build.outputs.config-service-tag }} \
            --set replicaCount=2 \
            --values helm/core/config-service/values-staging.yaml

      - name: Wait for deployment
        run: |
          kubectl rollout status deployment/config-service -n cargobit --timeout=300s

      - name: Run smoke tests
        run: |
          curl -f https://staging.cargobit.io/health || exit 1

  # ===========================================================================
  # JOB: Deploy to Production
  # ===========================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    environment:
      name: production
      url: https://cargobit.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name cargobit-production

      - name: Deploy Config Service (Canary)
        run: |
          helm upgrade --install config-service ./helm/core/config-service \
            --namespace cargobit \
            --set image.tag=${{ needs.build.outputs.config-service-tag }} \
            --set replicaCount=3 \
            --set canary.enabled=true \
            --values helm/core/config-service/values-production.yaml

      - name: Monitor Canary
        run: |
          # Wait and check canary metrics
          sleep 300
          # Check error rate, latency, etc.
          ./scripts/check-canary-health.sh

      - name: Promote to Full Production
        run: |
          kubectl patch deployment config-service \
            -n cargobit \
            -p '{"spec":{"replicas":5}}'

      - name: Verify Production
        run: |
          curl -f https://cargobit.io/health || exit 1

  # ===========================================================================
  # JOB: Notify
  # ===========================================================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()

    steps:
      - name: Slack Notification
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "CargoBit Deployment",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Status: ${{ job.status }}*\n\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
