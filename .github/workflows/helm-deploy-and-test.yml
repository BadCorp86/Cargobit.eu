# =============================================================================
# Helm Deploy and Test Workflow
# =============================================================================
# Deployt Helm Chart und führt Tests aus
# =============================================================================

name: Helm Deploy and Test

on:
  workflow_dispatch:
    inputs:
      namespace:
        description: 'Kubernetes namespace'
        required: true
        default: 'staging'
      image-tag:
        description: 'Image tag to deploy'
        required: false
        default: 'latest'
      dry-run:
        description: 'Dry run only'
        required: false
        default: false
        type: boolean
  repository_dispatch:
    types: [images-built]

env:
  CHART_PATH: helm/payments-service
  HELM_VERSION: '3.12.0'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NAMESPACE: ${{ github.event.inputs.namespace || 'staging' }}
      IMAGE_TAG: ${{ github.event.client-payload.image_tag || github.event.inputs.image-tag || 'latest' }}
      REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
      NAMESPACE_REGISTRY: ${{ secrets.DOCKER_NAMESPACE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Decode kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          echo "$KUBE_CONFIG_DATA" | base64 --decode > kubeconfig
          chmod 600 kubeconfig
          export KUBECONFIG=$PWD/kubeconfig
          kubectl version --short || kubectl version

      - name: Helm lint
        run: helm lint $CHART_PATH

      - name: Helm template (preview)
        run: |
          helm template payments $CHART_PATH \
            --namespace $NAMESPACE \
            --set image.repository=${{ env.REGISTRY }}/${{ env.NAMESPACE_REGISTRY }}/payments-backend \
            --set image.tag=$IMAGE_TAG \
            --set workerImage.repository=${{ env.REGISTRY }}/${{ env.NAMESPACE_REGISTRY }}/payments-worker \
            --set workerImage.tag=$IMAGE_TAG

      - name: Helm upgrade --install (dry-run)
        if: github.event.inputs.dry-run == 'true'
        run: |
          helm upgrade --install payments $CHART_PATH \
            --namespace $NAMESPACE --create-namespace \
            --set image.repository=${{ env.REGISTRY }}/${{ env.NAMESPACE_REGISTRY }}/payments-backend \
            --set image.tag=$IMAGE_TAG \
            --set workerImage.repository=${{ env.REGISTRY }}/${{ env.NAMESPACE_REGISTRY }}/payments-worker \
            --set workerImage.tag=$IMAGE_TAG \
            --dry-run

      - name: Helm upgrade --install
        if: github.event.inputs.dry-run != 'true'
        run: |
          helm upgrade --install payments $CHART_PATH \
            --namespace $NAMESPACE --create-namespace \
            --set image.repository=${{ env.REGISTRY }}/${{ env.NAMESPACE_REGISTRY }}/payments-backend \
            --set image.tag=$IMAGE_TAG \
            --set workerImage.repository=${{ env.REGISTRY }}/${{ env.NAMESPACE_REGISTRY }}/payments-worker \
            --set workerImage.tag=$IMAGE_TAG \
            --wait --timeout 5m \
            --history-max 10

      - name: Verify deployment
        if: github.event.inputs.dry-run != 'true'
        env:
          KUBECONFIG: ${{ github.workspace }}/kubeconfig
        run: |
          echo "### Deployment Status" >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n $NAMESPACE -l app=payments -o wide >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          kubectl get deployment -n $NAMESPACE >> $GITHUB_STEP_SUMMARY

      - name: Run helm tests
        if: github.event.inputs.dry-run != 'true'
        env:
          KUBECONFIG: ${{ github.workspace }}/kubeconfig
        run: |
          helm test payments --namespace $NAMESPACE --timeout 2m || echo "No helm tests defined"

      - name: Run smoke tests
        if: github.event.inputs.dry-run != 'true'
        env:
          ADMIN_JWT: ${{ secrets.ADMIN_JWT }}
        run: |
          if [ -f "./scripts/verify_smoke.sh" ]; then
            chmod +x ./scripts/verify_smoke.sh
            ./scripts/verify_smoke.sh "https://payments.${NAMESPACE}.cargobit.io" "$ADMIN_JWT" || true
          fi

      - name: Create GitHub Release (production only)
        if: github.event.inputs.dry-run != 'true' && github.event.inputs.namespace == 'production'
        uses: ncipollo/release-action@v1
        with:
          tag: "deploy-${{ github.run_id }}"
          name: "Helm deploy to production"
          body: |
            Deployed to production
            Image tag: ${{ env.IMAGE_TAG }}
            Commit: ${{ github.sha }}

      - name: Cleanup
        if: always()
        run: rm -f kubeconfig

# =============================================================================
# Erforderliche Secrets
# =============================================================================
#
# - KUBE_CONFIG_DATA    - Base64 kubeconfig für CI
# - DOCKER_REGISTRY     - z.B. registry.example.com
# - DOCKER_NAMESPACE    - z.B. myteam
# - ADMIN_JWT           - (optional) Für Smoke Tests
#
