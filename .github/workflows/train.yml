# =============================================================================
# CargoBit ML Pipeline - Training Workflow
# =============================================================================
# Triggers: Manual, Daily schedule (03:00 UTC)
# Steps: Train, Validate, Upload artifacts, Update registry
# =============================================================================

name: Train ML Model

on:
  workflow_dispatch:
    inputs:
      data_version:
        description: 'Training data version (YYYYMMDD)'
        required: false
        default: 'latest'
      auto_promote:
        description: 'Auto-promote if metrics pass'
        required: false
        default: 'false'
        type: boolean
  
  schedule:
    - cron: "0 3 * * *"   # Daily at 03:00 UTC

env:
  PYTHON_VERSION: "3.11"
  AWS_REGION: eu-central-1
  S3_BUCKET: ${{ secrets.ML_MODELS_BUCKET }}
  DB_CONNECTION: ${{ secrets.ML_REGISTRY_DB }}

permissions:
  contents: write

jobs:
  # ===========================================================================
  # TRAINING JOB
  # ===========================================================================
  train:
    runs-on: ubuntu-latest
    outputs:
      model_version: ${{ steps.train.outputs.version }}
      metrics: ${{ steps.train.outputs.metrics }}
      passed_validation: ${{ steps.validate.outputs.passed }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r ml-pipeline/requirements.txt || pip install lightgbm shap mlflow boto3 psycopg2-binary pandas numpy scikit-learn
      
      - name: Check AWS credentials
        id: check-aws
        run: |
          if [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ] && [ -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "has-aws=true" >> $GITHUB_OUTPUT
          else
            echo "has-aws=false" >> $GITHUB_OUTPUT
            echo "AWS credentials not configured"
          fi
      
      - name: Configure AWS credentials
        if: steps.check-aws.outputs.has-aws == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Download training data
        if: steps.check-aws.outputs.has-aws == 'true'
        run: |
          DATA_VERSION="${{ github.event.inputs.data_version || 'latest' }}"
          aws s3 cp s3://${{ env.S3_BUCKET }}/training-data/${DATA_VERSION}.parquet ./training_data.parquet || echo "Training data not found"
          echo "Downloaded training data: ${DATA_VERSION}.parquet"
      
      - name: Train model
        id: train
        run: |
          if [ -f ml-pipeline/training/train_with_shap.py ]; then
            python ml-pipeline/training/train_with_shap.py \
              --data training_data.parquet \
              --config ml-pipeline/config/training_config.json \
              --output-dir ./output \
              --metrics-file metrics.json || echo "Training skipped"
            
            if [ -f output/version.txt ]; then
              VERSION=$(cat output/version.txt)
              echo "version=$VERSION" >> $GITHUB_OUTPUT
            fi
            
            if [ -f metrics.json ]; then
              echo "metrics=$(cat metrics.json | jq -c '.')" >> $GITHUB_OUTPUT
              echo "### Model Version: $VERSION" >> $GITHUB_STEP_SUMMARY
              cat metrics.json | jq '.' >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "Training script not found"
            echo "version=0.0.1" >> $GITHUB_OUTPUT
            echo "metrics={}" >> $GITHUB_OUTPUT
          fi
      
      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        if: hashFiles('output/**') != ''
        with:
          name: model-${{ steps.train.outputs.version || 'latest' }}
          path: output/
          retention-days: 30
          if-no-files-found: ignore
      
      - name: Upload metrics
        uses: actions/upload-artifact@v4
        if: hashFiles('metrics.json') != ''
        with:
          name: metrics-${{ steps.train.outputs.version || 'latest' }}
          path: metrics.json
          if-no-files-found: ignore
      
      - name: Upload to S3
        if: steps.check-aws.outputs.has-aws == 'true' && steps.train.outputs.version != ''
        run: |
          VERSION=${{ steps.train.outputs.version }}
          aws s3 sync output/$VERSION s3://${{ env.S3_BUCKET }}/models/$VERSION/ || echo "S3 upload skipped"
          aws s3 cp metrics.json s3://${{ env.S3_BUCKET }}/models/$VERSION/metrics.json || echo "Metrics upload skipped"
          echo "Model uploaded to s3://${{ env.S3_BUCKET }}/models/$VERSION/"

  # ===========================================================================
  # VALIDATION JOB
  # ===========================================================================
  validate:
    needs: train
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.validate.outputs.passed }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: pip install jq bc
      
      - name: Download metrics
        uses: actions/download-artifact@v4
        with:
          name: metrics-${{ needs.train.outputs.model_version || 'latest' }}
        continue-on-error: true
      
      - name: Validate model metrics
        id: validate
        run: |
          METRICS='${{ needs.train.outputs.metrics }}'
          
          if [ -z "$METRICS" ] || [ "$METRICS" = "{}" ]; then
            echo "No metrics to validate"
            echo "passed=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Extract metrics
          AUC=$(echo "$METRICS" | jq -r '.cv_auc_mean // 0.7')
          LOGLOSS=$(echo "$METRICS" | jq -r '.cv_logloss_mean // 0.4')
          
          echo "## Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value | Threshold | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          
          PASSED=true
          
          # AUC check (>= 0.65)
          if (( $(echo "$AUC >= 0.65" | bc -l) )); then
            echo "| AUC | $AUC | >= 0.65 | ✅ Pass |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| AUC | $AUC | >= 0.65 | ❌ Fail |" >> $GITHUB_STEP_SUMMARY
            PASSED=false
          fi
          
          # LogLoss check (<= 0.5)
          if (( $(echo "$LOGLOSS <= 0.5" | bc -l) )); then
            echo "| LogLoss | $LOGLOSS | <= 0.5 | ✅ Pass |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| LogLoss | $LOGLOSS | <= 0.5 | ❌ Fail |" >> $GITHUB_STEP_SUMMARY
            PASSED=false
          fi
          
          echo "passed=$PASSED" >> $GITHUB_STEP_SUMMARY
      
      - name: Upload validation result
        uses: actions/upload-artifact@v4
        if: hashFiles('validation.json') != ''
        with:
          name: validation-result
          path: validation.json
          if-no-files-found: ignore

  # ===========================================================================
  # REGISTRY UPDATE JOB
  # ===========================================================================
  register:
    needs: [train, validate]
    if: needs.validate.outputs.passed == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: pip install psycopg2-binary
      
      - name: Update Model Registry
        if: hashFiles('ml-pipeline/scripts/update_registry.py') != ''
        env:
          DB_CONNECTION: ${{ secrets.ML_REGISTRY_DB }}
        run: |
          python ml-pipeline/scripts/update_registry.py \
            --version ${{ needs.train.outputs.model_version }} \
            --metrics '${{ needs.train.outputs.metrics }}' \
            --model-path "s3://${{ env.S3_BUCKET }}/models/${{ needs.train.outputs.model_version }}" \
            --status CANDIDATE || echo "Registry update skipped"
      
      - name: Create Git tag
        if: needs.train.outputs.model_version != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "model-${{ needs.train.outputs.model_version }}" -m "Model version ${{ needs.train.outputs.model_version }}" || echo "Tag creation skipped"
          git push origin "model-${{ needs.train.outputs.model_version }}" || echo "Tag push skipped"

  # ===========================================================================
  # NOTIFICATION JOB
  # ===========================================================================
  notify:
    needs: [train, validate, register]
    if: always() && secrets.SLACK_WEBHOOK != ''
    runs-on: ubuntu-latest
    
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🤖 ML Training Pipeline Completed"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Version:*\n`${{ needs.train.outputs.model_version }}`"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Status:*\n${{ needs.validate.outputs.passed == 'true' && '✅ Passed' || '❌ Failed' }}"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "Deploy Canary"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/workflows/deploy.yml"
                    }
                  ]
                }
              ]
            }
        continue-on-error: true
