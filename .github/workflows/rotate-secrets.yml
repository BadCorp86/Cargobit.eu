# =============================================================================
# Secret Rotation Workflow
# =============================================================================
# Rotiert automatisch Secrets in regelmäßigen Abständen
# Schedule: Wöchentlich (Sonntag 03:00 UTC)
# =============================================================================

name: Rotate Secrets

on:
  workflow_dispatch:
    inputs:
      secret-type:
        description: 'Which secret to rotate'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - stripe-keys
          - admin-jwt
          - kubernetes-token
  schedule:
    - cron: '0 3 * * 0'  # Jeden Sonntag 03:00 UTC

permissions:
  secrets: write
  contents: write

jobs:
  rotate-stripe-keys:
    if: github.event.inputs.secret-type == 'all' || github.event.inputs.secret-type == 'stripe-keys' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    outputs:
      success: ${{ steps.rotate.outputs.success }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rotate Stripe API Key
        id: rotate
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: |
          echo "Rotiere Stripe API Key..."
          
          # Neuen Key über Stripe API erstellen
          RESPONSE=$(curl -s -w "\n%{http_code}" https://api.stripe.com/v1/api_keys \
            -u "$STRIPE_SECRET_KEY:" \
            -d name="CI/CD Key - $(date +%Y-%m-%d)" \
            -d type="secret")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Stripe API returned HTTP $HTTP_CODE"
            echo "success=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          NEW_KEY=$(echo "$BODY" | jq -r '.secret // empty')
          
          if [ -z "$NEW_KEY" ]; then
            echo "::error::No secret key in response"
            echo "success=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          echo "new_key=$NEW_KEY" >> $GITHUB_OUTPUT
          echo "success=true" >> $GITHUB_OUTPUT
          echo "✓ Neuer Stripe Key erstellt"

      - name: Update GitHub Secret
        if: steps.rotate.outputs.success == 'true'
        env:
          GH_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          echo "${{ steps.rotate.outputs.new_key }}" | gh secret set STRIPE_SECRET_KEY --repo ${{ github.repository }}

  rotate-admin-jwt:
    if: github.event.inputs.secret-type == 'all' || github.event.inputs.secret-type == 'admin-jwt' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Generate new Admin JWT
        id: generate
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          # JWT mit Node.js generieren
          npm install -g jsonwebtoken
          
          # JWT ID
          JWT_ID=$(cat /proc/sys/kernel/random/uuid)
          NOW=$(date +%s)
          EXP=$((NOW + 7776000))  # 90 Tage
          
          # JWT Payload
          PAYLOAD=$(cat <<EOF
          {
            "jti": "$JWT_ID",
            "iss": "cargobit-ci",
            "sub": "admin-rotation",
            "aud": "cargobit-api",
            "iat": $NOW,
            "exp": $EXP,
            "role": "ADMIN",
            "userId": "ci-rotation"
          }
          EOF
          )
          
          # JWT erstellen
          NEW_JWT=$(node -e "
            const jwt = require('jsonwebtoken');
            const payload = $PAYLOAD;
            const token = jwt.sign(payload, process.env.JWT_SECRET, { algorithm: 'HS256' });
            console.log(token);
          ")
          
          echo "new_jwt=$NEW_JWT" >> $GITHUB_OUTPUT
          echo "jwt_id=$JWT_ID" >> $GITHUB_OUTPUT
          echo "✓ Neuer Admin JWT erstellt (JTI: $JWT_ID)"

      - name: Update GitHub Secret
        env:
          GH_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          echo "${{ steps.generate.outputs.new_jwt }}" | gh secret set ADMIN_JWT --repo ${{ github.repository }}

  rotate-kubernetes-token:
    if: github.event.inputs.secret-type == 'all' || github.event.inputs.secret-type == 'kubernetes-token' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decode kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          echo "$KUBE_CONFIG_DATA" | base64 --decode > kubeconfig
          chmod 600 kubeconfig

      - name: Rotate Service Account Token
        id: rotate
        env:
          KUBECONFIG: ${{ github.workspace }}/kubeconfig
        run: |
          NAMESPACE="${{ vars.KUBE_NAMESPACE || 'staging' }}"
          SA="ci-deployer"
          
          # Neues Token erstellen (90 Tage = 2160h)
          NEW_TOKEN=$(kubectl create token $SA -n $NAMESPACE --duration=2160h)
          
          if [ -z "$NEW_TOKEN" ]; then
            echo "::error::Token creation failed"
            exit 1
          fi
          
          echo "new_token=$NEW_TOKEN" >> $GITHUB_OUTPUT
          echo "✓ Neues K8s Service Account Token erstellt"

      - name: Rebuild kubeconfig with new token
        id: rebuild
        env:
          KUBECONFIG: ${{ github.workspace }}/kubeconfig
          NEW_TOKEN: ${{ steps.rotate.outputs.new_token }}
        run: |
          NAMESPACE="${{ vars.KUBE_NAMESPACE || 'staging' }}"
          
          # CA und Server extrahieren
          CA_CERT=$(kubectl config view --raw -o jsonpath='{.clusters[0].cluster.certificate-authority-data}')
          SERVER=$(kubectl config view --raw -o jsonpath='{.clusters[0].cluster.server}')
          
          # Neue kubeconfig
          cat > new-kubeconfig.yaml <<EOF
          apiVersion: v1
          kind: Config
          clusters:
          - cluster:
              certificate-authority-data: ${CA_CERT}
              server: ${SERVER}
            name: ${NAMESPACE}-cluster
          contexts:
          - context:
              cluster: ${NAMESPACE}-cluster
              user: ci-deployer
              namespace: ${NAMESPACE}
            name: ci-deployer-context
          current-context: ci-deployer-context
          users:
          - name: ci-deployer
            user:
              token: ${NEW_TOKEN}
          EOF
          
          # Base64
          KUBECONFIG_B64=$(base64 -w0 new-kubeconfig.yaml)
          echo "kubeconfig_b64=$KUBECONFIG_B64" >> $GITHUB_OUTPUT

      - name: Update GitHub Secret
        env:
          GH_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          echo "${{ steps.rebuild.outputs.kubeconfig_b64 }}" | gh secret set KUBE_CONFIG_DATA --repo ${{ github.repository }}

  notify-success:
    needs: [rotate-stripe-keys, rotate-admin-jwt, rotate-kubernetes-token]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Create Summary
        run: |
          echo "## Secret Rotation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Secret | Status | Timestamp |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Stripe API Key | ${{ needs.rotate-stripe-keys.result }} | $(date -u +"%Y-%m-%dT%H:%M:%SZ") |" >> $GITHUB_STEP_SUMMARY
          echo "| Admin JWT | ${{ needs.rotate-admin-jwt.result }} | $(date -u +"%Y-%m-%dT%H:%M:%SZ") |" >> $GITHUB_STEP_SUMMARY
          echo "| K8s SA Token | ${{ needs.rotate-kubernetes-token.result }} | $(date -u +"%Y-%m-%dT%H:%M:%SZ") |" >> $GITHUB_STEP_SUMMARY

      - name: Notify Slack (optional)
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "🔐 Secret Rotation abgeschlossen",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Secret Rotation Completed*\n• Stripe Key: ${{ needs.rotate-stripe-keys.result }}\n• Admin JWT: ${{ needs.rotate-admin-jwt.result }}\n• K8s Token: ${{ needs.rotate-kubernetes-token.result }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

# =============================================================================
# Erforderliche Secrets & Variables
# =============================================================================
#
# Secrets:
# - STRIPE_SECRET_KEY   - Aktueller Stripe API Key
# - JWT_SECRET          - Secret für JWT Signierung
# - KUBE_CONFIG_DATA    - Base64 kubeconfig
# - ADMIN_TOKEN         - GitHub PAT mit secrets:write
# - SLACK_WEBHOOK_URL   - (optional) Slack Webhook
#
# Variables:
# - KUBE_NAMESPACE      - Kubernetes Namespace (default: staging)
#
