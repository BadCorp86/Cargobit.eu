# =============================================================================
# ServiceAccount, Role, RoleBinding für namespace-scoped CI kubeconfig
# =============================================================================
# Zweck: Namespace-beschränkter ServiceAccount mit minimalen Rechten für CI/CD
# Namespace: staging (anpassen falls anders)
# =============================================================================

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ci-deployer
  namespace: staging
  labels:
    app: payments-ci
    team: platform
    managed-by: kubectl

---
# =============================================================================
# Role: Namespace-scoped Berechtigungen
# =============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ci-deployer-role
  namespace: staging
  labels:
    app: payments-ci
rules:
  # Deployments, ReplicaSets, StatefulSets
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Pods for readiness checks and logs
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]

  # Services, ConfigMaps
  - apiGroups: [""]
    resources: ["services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Secrets (read-only für envFrom, write für SealedSecret apply)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]

  # Jobs and CronJobs for scheduler
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Events for debugging
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create", "patch"]

  # Ingress
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # HorizontalPodAutoscaler
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # PodDisruptionBudget
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # RBAC (read-only für Helm)
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch"]

  # SealedSecrets
  - apiGroups: ["bitnami.com"]
    resources: ["sealedsecrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]

  # ServiceAccounts (read-only)
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "watch"]

  # Rollout restart
  - apiGroups: ["apps"]
    resources: ["deployments/restart"]
    verbs: ["create"]

---
# =============================================================================
# RoleBinding: Verknüpft ServiceAccount mit Role
# =============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ci-deployer-binding
  namespace: staging
  labels:
    app: payments-ci
subjects:
  - kind: ServiceAccount
    name: ci-deployer
    namespace: staging
roleRef:
  kind: Role
  name: ci-deployer-role
  apiGroup: rbac.authorization.k8s.io

---
# =============================================================================
# Anleitung
# =============================================================================
# 
# 1. RBAC anwenden:
#    kubectl apply -f kubernetes/ci-serviceaccount-rbac.yaml
#
# 2. Kubeconfig erzeugen:
#    ./scripts/create-kubeconfig-for-ci.sh staging ci-deployer
#
# 3. Als GitHub Secret speichern:
#    KUBE_CONFIG_DATA=<base64-kubeconfig>
#
# 4. Für Production: Separaten Namespace und ServiceAccount verwenden
#    kubectl apply -f kubernetes/ci-serviceaccount-rbac.yaml -n production
#
# =============================================================================
# Sicherheitshinweise
# =============================================================================
#
# - Namespace-scoped: Keine Cluster-weiten Rechte
# - Secrets: create/update erlaubt für SealedSecret workflow
# - Token-Rotation: Alle 90 Tage empfohlen
# - Audit: Protokolliere wer wann das Secret erstellt hat
#
# =============================================================================
