# =============================================================================
# CargoBit ML Serving Service - Kubernetes Deployment
# =============================================================================
# Deploy with: kubectl apply -f kubernetes-ml-serving.yaml
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-serving-service
  namespace: cargobit
  labels:
    app: ml-serving
    version: v2
    team: ml-platform
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ml-serving
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ml-serving
        version: v2
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: ml-serving-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      # Init container to download model
      initContainers:
        - name: model-downloader
          image: amazon/aws-cli:latest
          command:
            - /bin/sh
            - -c
            - |
              aws s3 cp ${MODEL_S3_PATH} /models/model.txt
              echo "Model downloaded successfully"
          env:
            - name: MODEL_S3_PATH
              valueFrom:
                configMapKeyRef:
                  name: ml-serving-config
                  key: model_s3_path
          volumeMounts:
            - name: model-volume
              mountPath: /models
      
      containers:
        - name: ml-serving
          image: cargobit/ml-serving:2.0.0
          imagePullPolicy: Always
          
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          
          env:
            - name: MODEL_PATH
              value: /models/model.txt
            - name: CONFIG_PATH
              value: /config/scoring-config.yaml
            - name: ML_ALPHA
              valueFrom:
                configMapKeyRef:
                  name: ml-serving-config
                  key: alpha
            - name: ML_FALLBACK
              value: "true"
            - name: LOG_LEVEL
              value: INFO
          
          envFrom:
            - configMapRef:
                name: ml-serving-config
          
          volumeMounts:
            - name: model-volume
              mountPath: /models
              readOnly: true
            - name: config-volume
              mountPath: /config
              readOnly: true
          
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          
          # Liveness probe
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          # Readiness probe
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      
      volumes:
        - name: model-volume
          emptyDir: {}
        - name: config-volume
          configMap:
            name: scoring-config
      
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: ml-serving
                topologyKey: kubernetes.io/hostname
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              preference:
                matchExpressions:
                  - key: node-type
                    operator: In
                    values:
                      - ml-workload

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: ml-serving-service
  namespace: cargobit
  labels:
    app: ml-serving
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
  selector:
    app: ml-serving

---
# ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: ml-serving-config
  namespace: cargobit
data:
  alpha: "0.8"
  model_s3_path: "s3://cargobit-ml-models/acceptance_v1/model_latest.txt"
  LOG_LEVEL: "INFO"

---
# HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ml-serving-hpa
  namespace: cargobit
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ml-serving-service
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60

---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ml-serving-sa
  namespace: cargobit
  labels:
    app: ml-serving

---
# PodDisruptionBudget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ml-serving-pdb
  namespace: cargobit
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: ml-serving

---
# NetworkPolicy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ml-serving-network-policy
  namespace: cargobit
spec:
  podSelector:
    matchLabels:
      app: ml-serving
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: cargobit
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443  # HTTPS for S3
    - to:
        - namespaceSelector:
            matchLabels:
              name: kube-system
      ports:
        - protocol: UDP
          port: 53  # DNS
