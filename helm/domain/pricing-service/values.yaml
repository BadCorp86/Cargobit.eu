# =============================================================================
# CargoBit Pricing Service - Helm Values
# =============================================================================
# Version: 2026-04-18-01
# =============================================================================

# -----------------------------------------------------------------------------
# Application Settings
# -----------------------------------------------------------------------------
replicaCount: 2

image:
  repository: cargobit/pricing-service
  tag: "1.0.0"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

# -----------------------------------------------------------------------------
# Service Account
# -----------------------------------------------------------------------------
serviceAccount:
  create: true
  annotations: {}
  name: "pricing-service"
  automountServiceAccountToken: true

# -----------------------------------------------------------------------------
# Pod Security Context
# -----------------------------------------------------------------------------
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true

# -----------------------------------------------------------------------------
# Service Configuration
# -----------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 80
  targetPort: 3002
  annotations: {}

# -----------------------------------------------------------------------------
# Environment Variables
# -----------------------------------------------------------------------------
env:
  SECURITY_CONFIG_URL: "http://security-config-service.core.svc.cluster.local:3005"
  KAFKA_BROKER: "kafka.data.svc.cluster.local:9092"
  KAFKA_CONSUMER_GROUP: "pricing-service"
  KAFKA_TOPIC_ORDERS: "cargobit.orders"
  KAFKA_TOPIC_BIDS: "cargobit.bids"
  KAFKA_TOPIC_EVENTS: "cargobit.events"
  REDIS_URL: "redis://redis.data.svc.cluster.local:6379"
  LOG_LEVEL: "info"
  NODE_ENV: "production"

envFrom:
  - configMapRef:
      name: pricing-service-config
  - secretRef:
      name: pricing-service-secrets

# -----------------------------------------------------------------------------
# Resources
# -----------------------------------------------------------------------------
resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

# -----------------------------------------------------------------------------
# Autoscaling (HPA)
# -----------------------------------------------------------------------------
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

# -----------------------------------------------------------------------------
# Pod Disruption Budget
# -----------------------------------------------------------------------------
podDisruptionBudget:
  enabled: true
  minAvailable: 1
  # maxUnavailable: 1

# -----------------------------------------------------------------------------
# Node Selector & Tolerations
# -----------------------------------------------------------------------------
nodeSelector: {}
tolerations: []
affinity: {}

# -----------------------------------------------------------------------------
# Health Checks
# -----------------------------------------------------------------------------
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# -----------------------------------------------------------------------------
# Network Policy
# -----------------------------------------------------------------------------
networkPolicy:
  enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              type: core
        - namespaceSelector:
            matchLabels:
              type: domain
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              type: core
    - to:
        - namespaceSelector:
            matchLabels:
              type: data

# -----------------------------------------------------------------------------
# mTLS Configuration
# -----------------------------------------------------------------------------
mtls:
  enabled: true
  caSecretName: "internal-ca"
  clientCertSecretName: "pricing-service-client-cert"

# -----------------------------------------------------------------------------
# Observability
# -----------------------------------------------------------------------------
observability:
  metrics:
    enabled: true
    port: 9090
    path: /metrics
  
  tracing:
    enabled: true
    sampleRate: 0.1
    endpoint: "http://tempo.observability.svc.cluster.local:4318"
  
  logging:
    format: "json"
    level: "info"

# -----------------------------------------------------------------------------
# Rate Limiting (Service-Specific)
# -----------------------------------------------------------------------------
rateLimits:
  rules:
    - route: /api/pricing/orders/*/bid/validate
      method: POST
      limit: 300
      windowSeconds: 60
      key: sub

# -----------------------------------------------------------------------------
# Fraud Scoring Configuration (from Security-Config)
# -----------------------------------------------------------------------------
fraudConfig:
  enabled: true
  carrierScoreWeights:
    cancelRate: 0.3
    disputeRate: 0.3
    noShowRate: 0.2
    patternScore: 0.2
  bidScoreWeights:
    dumping: 0.5
    spam: 0.3
    coordination: 0.2
  totalScore:
    alphaCarrier: 0.6
    penaltyFactor: 0.5
