apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "matching-service.fullname" . }}
  labels:
    {{- include "matching-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: domain-service
    app.kubernetes.io/part-of: cargobit
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "matching-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "matching-service.selectorLabels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.observability.metrics.port }}"
        prometheus.io/path: "{{ .Values.observability.metrics.path }}"
    spec:
      serviceAccountName: {{ include "matching-service.serviceAccountName" . }}
      
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
            {{- if .Values.observability.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.observability.metrics.port }}
              protocol: TCP
            {{- end }}
          
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          
          envFrom:
            {{- toYaml .Values.envFrom | nindent 12 }}
          
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.mtls.enabled }}
            - name: mtls-ca
              mountPath: /etc/ssl/certs/internal
              readOnly: true
            - name: mtls-client
              mountPath: /etc/ssl/client
              readOnly: true
            {{- end }}
      
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.mtls.enabled }}
        - name: mtls-ca
          secret:
            secretName: {{ .Values.mtls.caSecretName }}
        - name: mtls-client
          secret:
            secretName: {{ .Values.mtls.clientCertSecretName }}
        {{- end }}
      
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
