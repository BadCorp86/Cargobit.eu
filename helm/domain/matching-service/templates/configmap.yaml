apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "matching-service.fullname" . }}-config
  labels:
    {{- include "matching-service.labels" . | nindent 4 }}
data:
  NODE_ENV: {{ .Values.env.NODE_ENV | default "production" }}
  LOG_LEVEL: {{ .Values.observability.logging.level | default "info" }}
  LOG_FORMAT: {{ .Values.observability.logging.format | default "json" }}
  METRICS_PORT: {{ .Values.observability.metrics.port | default "9090" | quote }}
  TRACING_ENABLED: {{ .Values.observability.tracing.enabled | default true | quote }}
