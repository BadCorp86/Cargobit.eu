# Default values for matching-service
# This is a YAML-formatted file.

replicaCount: 2

image:
  repository: cargobit/matching-service
  pullPolicy: IfNotPresent
  tag: "1.0.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

# Environment configuration
env:
  NODE_ENV: "production"
  SECURITY_CONFIG_URL: "http://security-config-service.core.svc.cluster.local:3005"
  KAFKA_BROKER: "kafka.data.svc.cluster.local:9092"
  REDIS_URL: "redis.data.svc.cluster.local:6379"

envFrom: []

# Health checks
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Network Policy
networkPolicy:
  enabled: true

# Pod Disruption Budget
pdb:
  enabled: true
  minAvailable: 1

# mTLS configuration
mtls:
  enabled: true
  caSecretName: "internal-ca"
  clientCertSecretName: "matching-service-client-cert"

# Observability
observability:
  metrics:
    enabled: true
    port: 9090
    path: /metrics
  tracing:
    enabled: true
    endpoint: "http://tempo.observability.svc.cluster.local:4318"
  logging:
    level: "info"
    format: "json"
