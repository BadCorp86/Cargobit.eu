{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "risk-service.fullname" . }}-netpol
  labels:
    {{- include "risk-service.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "risk-service.selectorLabels" . | nindent 6 }}
  
  policyTypes:
    - Ingress
    - Egress
  
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              type: core
        - namespaceSelector:
            matchLabels:
              type: domain
      ports:
        - port: {{ .Values.service.targetPort }}
          protocol: TCP
    
    - from:
        - namespaceSelector:
            matchLabels:
              name: observability
      ports:
        - port: {{ .Values.observability.metrics.port }}
          protocol: TCP
  
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    
    - to:
        - namespaceSelector:
            matchLabels:
              type: core
      ports:
        - port: 3005
          protocol: TCP
    
    - to:
        - namespaceSelector:
            matchLabels:
              type: data
      ports:
        - port: 9092
          protocol: TCP
        - port: 5432
          protocol: TCP
        - port: 6379
          protocol: TCP
    
    - to:
        - namespaceSelector:
            matchLabels:
              name: observability
      ports:
        - port: 4318
          protocol: TCP
{{- end }}
