# Default values for risk-service
replicaCount: 2

image:
  repository: cargobit/risk-service
  pullPolicy: IfNotPresent
  tag: "1.0.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

resources:
  limits:
    cpu: 750m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70

nodeSelector: {}
tolerations: []
affinity: {}

env:
  NODE_ENV: "production"
  SECURITY_CONFIG_URL: "http://security-config-service.core.svc.cluster.local:3005"
  KAFKA_BROKER: "kafka.data.svc.cluster.local:9092"
  DATABASE_URL: "postgresql://postgres.data.svc.cluster.local:5432/cargobit"
  REDIS_URL: "redis.data.svc.cluster.local:6379"

envFrom: []

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

networkPolicy:
  enabled: true

pdb:
  enabled: true
  minAvailable: 1

mtls:
  enabled: true
  caSecretName: "internal-ca"
  clientCertSecretName: "risk-service-client-cert"

observability:
  metrics:
    enabled: true
    port: 9090
    path: /metrics
  tracing:
    enabled: true
    endpoint: "http://tempo.observability.svc.cluster.local:4318"
  logging:
    level: "info"
    format: "json"
