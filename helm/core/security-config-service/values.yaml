# Default values for security-config-service
replicaCount: 3

image:
  repository: cargobit/security-config-service
  pullPolicy: IfNotPresent
  tag: "1.0.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true

service:
  type: ClusterIP
  port: 3005
  targetPort: 3005

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 5
  targetCPUUtilizationPercentage: 60

nodeSelector: {}
tolerations: []
affinity: {}

env:
  NODE_ENV: "production"
  DATABASE_URL: "postgresql://postgres.data.svc.cluster.local:5432/cargobit"
  REDIS_URL: "redis.data.svc.cluster.local:6379"
  CONFIG_CACHE_TTL: "300"
  CONFIG_VERSION: "2024-01-15-01"

envFrom: []

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

networkPolicy:
  enabled: true

pdb:
  enabled: true
  minAvailable: 2

mtls:
  enabled: true
  caSecretName: "internal-ca"
  serverCertSecretName: "security-config-service-tls"

observability:
  metrics:
    enabled: true
    port: 9090
    path: /metrics
  tracing:
    enabled: true
    endpoint: "http://tempo.observability.svc.cluster.local:4318"
  logging:
    level: "info"
    format: "json"

# Security config storage
configStorage:
  type: "database"  # database | file
  database:
    table: "security_configs"
  file:
    path: "/config/security-config.yaml"

# Caching
caching:
  enabled: true
  ttl: 300
  refreshAhead: 60
