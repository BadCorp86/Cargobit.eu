{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "security-config-service.fullname" . }}-netpol
  labels:
    {{- include "security-config-service.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "security-config-service.selectorLabels" . | nindent 6 }}
  
  policyTypes:
    - Ingress
    - Egress
  
  ingress:
    # Only allow mTLS connections from domain services
    - from:
        - namespaceSelector:
            matchLabels:
              type: domain
        - namespaceSelector:
            matchLabels:
              type: core
      ports:
        - port: {{ .Values.service.targetPort }}
          protocol: TCP
    
    # Allow metrics scraping from Prometheus
    - from:
        - namespaceSelector:
            matchLabels:
              name: observability
      ports:
        - port: {{ .Values.observability.metrics.port }}
          protocol: TCP
  
  egress:
    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    
    # Allow to Database (data namespace)
    - to:
        - namespaceSelector:
            matchLabels:
              type: data
      ports:
        - port: 5432
          protocol: TCP
        - port: 6379
          protocol: TCP
    
    # Allow to Tempo for tracing
    - to:
        - namespaceSelector:
            matchLabels:
              name: observability
      ports:
        - port: 4318
          protocol: TCP
{{- end }}
