# =============================================================================
# CargoBit Config Service - Helm Values
# =============================================================================

replicaCount: 2

image:
  repository: cargobit/config-service
  pullPolicy: IfNotPresent
  tag: "1.0.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"

podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: config.cargobit.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# ConfigMap für scoring-config.yaml
configMap:
  enabled: true
  mountPath: /app/config

# Service Mesh
serviceMesh:
  enabled: false
  mtls: false

# Network Policy
networkPolicy:
  enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: cargobit
      ports:
        - protocol: TCP
          port: 8080

# Pod Disruption Budget
pdb:
  enabled: true
  minAvailable: 1

# Liveness/Readiness Probes
probes:
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

# Environment Variables
env:
  - name: LOG_LEVEL
    value: "INFO"
  - name: CONFIG_PATH
    value: "/app/config/scoring-config.yaml"
  - name: VERSIONING_ENABLED
    value: "true"
  - name: AUDIT_ENABLED
    value: "true"

# Secrets (if needed)
secrets: []
