# CargoBit Observability - Logging Configuration
# Version: 2024-01-15-01
# JSON logging format with correlation IDs

logging:
  # Global log format
  format: json
  level: info  # trace, debug, info, warn, error, fatal
  
  # JSON log structure
  structure:
    # Required fields (always present)
    required:
      - name: timestamp
        type: string
        format: ISO8601
        description: "Log timestamp in ISO 8601 format"
        example: "2024-01-15T10:30:45.123Z"
      
      - name: service
        type: string
        description: "Service name that generated the log"
        example: "pricing-service"
      
      - name: correlationId
        type: string
        format: UUID
        description: "Unique request correlation ID for tracing"
        example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      
      - name: level
        type: string
        enum: [trace, debug, info, warn, error, fatal]
        description: "Log level"
        example: "info"
      
      - name: message
        type: string
        description: "Log message"
        example: "Pricing validation completed successfully"
    
    # Optional fields (present when relevant)
    optional:
      - name: traceId
        type: string
        description: "OpenTelemetry trace ID"
        example: "4bf92f3577b34da6a3ce929d0e0e4736"
      
      - name: spanId
        type: string
        description: "OpenTelemetry span ID"
        example: "00f067aa0ba902b7"
      
      - name: userId
        type: string
        description: "User ID from JWT"
        example: "user-123"
      
      - name: carrierId
        type: string
        description: "Carrier ID if applicable"
        example: "carrier-456"
      
      - name: shipperId
        type: string
        description: "Shipper ID if applicable"
        example: "shipper-789"
      
      - name: orderId
        type: string
        description: "Order ID if applicable"
        example: "order-abc123"
      
      - name: transportId
        type: string
        description: "Transport ID if applicable"
        example: "transport-xyz789"
      
      - name: context
        type: object
        description: "Additional contextual data"
        example:
          validationType: "bid"
          result: "valid"
          duration: 0.025
      
      - name: error
        type: object
        description: "Error details for error-level logs"
        fields:
          - name: code
            type: string
            example: "VALIDATION_ERROR"
          - name: stack
            type: string
            example: "Error: ...\n    at validateBid (..."
      
      - name: httpRequest
        type: object
        description: "HTTP request details"
        fields:
          - name: method
            type: string
            example: "POST"
          - name: path
            type: string
            example: "/api/pricing/orders/123/bid/validate"
          - name: statusCode
            type: number
            example: 200
          - name: userAgent
            type: string
            example: "Mozilla/5.0..."
          - name: ip
            type: string
            example: "192.168.1.100"
      
      - name: duration
        type: number
        description: "Operation duration in seconds"
        example: 0.025
      
      - name: version
        type: string
        description: "Config version being used"
        example: "2024-01-15-01"

  # Service-specific logging configuration
  services:
    pricing-service:
      level: info
      includeContext:
        - validationType
        - result
        - fraudScore
        - bidAmount
    
    matching-service:
      level: info
      includeContext:
        - transportType
        - carriersCount
        - selectedCarriers
        - matchingDuration
    
    order-service:
      level: info
      includeContext:
        - orderId
        - orderStatus
        - transportType
    
    risk-service:
      level: info
      includeContext:
        - riskLevel
        - fraudScore
        - detectionType
    
    security-config-service:
      level: info
      includeContext:
        - configVersion
        - cacheStatus
        - validationResult
    
    api-gateway:
      level: info
      includeContext:
        - route
        - method
        - userId
        - role
        - statusCode

  # Sensitive data redaction
  redaction:
    enabled: true
    fields:
      - password
      - token
      - apiKey
      - secretKey
      - creditCard
      - iban
      - email
      - phoneNumber
    pattern: "***REDACTED***"
    
    # Partial redaction for some fields
    partial:
      email:
        pattern: "^(.)(.*)(@.*)$"
        replacement: "$1***$3"
      phoneNumber:
        pattern: "^(.{3})(.*)(.{2})$"
        replacement: "$1***$3"

  # Log output configuration
  output:
    # Console output
    console:
      enabled: true
      colorize: false
      prettyPrint: false
    
    # File output (for local development)
    file:
      enabled: false
      path: "/var/log/cargobit"
      filename: "{{service}}.log"
      maxSize: "100m"
      maxFiles: 5
    
    # Loki integration
    loki:
      enabled: true
      endpoint: "http://loki.observability.svc.cluster.local:3100"
      labels:
        - service
        - level
        - environment
      batchWait: "1s"
      batchSize: 102400  # 100KB

