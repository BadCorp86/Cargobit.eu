global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'cargobit-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # CargoBit Main App
  - job_name: 'cargobit-app'
    static_configs:
      - targets: ['app:3000']
    metrics_path: '/api/metrics'

  # Risk Engine Service
  - job_name: 'cargobit-risk-engine'
    static_configs:
      - targets: ['risk-engine:3003']
    metrics_path: '/metrics'

  # Security Gateway
  - job_name: 'cargobit-security-gateway'
    static_configs:
      - targets: ['security-gateway:3004']
    metrics_path: '/metrics'

  # PostgreSQL Exporter (if added)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    profiles:
      - monitoring

  # Redis Exporter (if added)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    profiles:
      - monitoring
